<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ表示を最適化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>フリック入力ゲーム</title>

    <!-- CSSファイルを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- タイトル -->
    <h1>フリック入力ゲーム</h1>

    <!-- ゲーム全体 -->
    <div class="game">

        <!-- スコア表示 -->
        <div class="info">
            <p>スコア : <span id="score">0</span></p>
            <p>残り時間 : <span id="time">30</span>秒</p>
        </div>

        <!-- 問題表示 -->
        <div id="question">あ</div>

        <!-- 入力欄 -->
        <input type="text" id="answer" placeholder="ここに入力">

        <!-- 結果表示 -->
        <div id="result"></div>

        <!-- スタートボタン -->
        <button id="startBtn">スタート</button>

    </div>

    <!-- JavaScript読み込み -->
    <script src="script.js"></script>

</body>
</html>

<!-- settings.jsonユーザー基本設定に色々入れた -->
