<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ画面に最適化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>フリックマスター</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" href="Smartphone.css">
</head>
<body>

    <!-- 背景装飾 -->
    <div class="background-circle"></div>
    <div class="background-circle2"></div>

    <!-- ゲーム本体 -->
    <div class="game">

        <!-- タイトル -->
        <h1>⚡ フリックマスター ⚡</h1>

        <!-- ステータス -->
        <div class="status">

            <!-- スコア -->
            <div class="card">
                <p>スコア</p>
                <h2 id="score">0</h2>
            </div>

            <!-- 時間 -->
            <div class="card">
                <p>残り時間</p>
                <h2><span id="time">60</span> 秒</h2>
            </div>

            <!-- コンボ -->
            <div class="card">
                <p>コンボ</p>
                <h2 id="combo">0</h2>
            </div>

        </div>

        <!-- 問題表示 -->
        <div id="question">あ</div>

        <!-- 入力欄 -->
        <input
            type="text"
            id="answer"
            placeholder="ここにフリック入力"
            autocomplete="off"
        >

        <!-- 結果 -->
        <div id="result"></div>

        <!-- ボタン -->
        <button id="startBtn">ゲームスタート</button>

        <!-- ランク表示 -->
        <div id="rank"></div>

    </div>

    <!-- JavaScript -->
    <script src="Smartphone.js"></script>

</body>
</html>
